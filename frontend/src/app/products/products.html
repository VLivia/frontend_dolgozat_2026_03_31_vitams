<h1>Termekek</h1>

@if (errorMessage) {
    <p>{{ errorMessage }}</p>
}

<table class="table table-striped table-info">
    <thead>
        <tr>
            <th>Id</th>
            <th>Nev</th>
            <th>Forma</th>
            <th>Ar</th>
        </tr>
    </thead>
    <tbody>
        @for (product of products; track product.id) {
            <tr>
                <td>{{ product.id }}</td>
                <td>{{ product.name }}</td>
                <td>{{ product.form }}</td>
                <td>{{ product.price ?? '-' }}</td>
            </tr>
        }
    </tbody>
</table>
